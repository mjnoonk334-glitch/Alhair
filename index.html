<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام التقارير اليومية</title>

  <link rel="stylesheet" href="./assets/css/style.css"/>

  <script type="module" src="./assets/js/app.js" defer></script>
</head>

<body>

  <div class="container">

    <header class="header">
      <h1>نظام التقارير اليومية</h1>
      <p>إدارة التقارير والتشغيل والصيانة</p>
    </header>

    <section class="card">

      <div class="grid">

        <div class="field">
          <label>التاريخ</label>
          <input type="date" id="date"/>
        </div>

        <div class="field">
          <label>اسم المشغل</label>
          <input type="text" id="operator"/>
        </div>

        <div class="field">
          <label>درجة الحرارة</label>
          <input type="number" id="temperature"/>
        </div>

        <div class="field">
          <label>مستوى PH</label>
          <input type="number" step="0.1" id="ph"/>
        </div>

        <div class="field">
          <label>العكارة</label>
          <input type="number" step="0.1" id="turbidity"/>
        </div>

      </div>

      <div class="actions">
        <button id="saveBtn">حفظ التقرير</button>
        <button id="printBtn">طباعة</button>
      </div>

    </section>

    <section class="card">
      <h2>سجل التقارير</h2>

      <table>
        <thead>
          <tr>
            <th>التاريخ</th>
            <th>المشغل</th>
            <th>PH</th>
            <th>الحرارة</th>
            <th>العكارة</th>
          </tr>
        </thead>

        <tbody id="reportsTable"></tbody>
      </table>
    </section>

  </div>

</body>
</html>
